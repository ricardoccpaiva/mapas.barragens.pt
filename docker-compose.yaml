version: '3.2'
services:
  tileserver-gl:
    build: .
    image: mapas-barragens-tileserver:latest
    restart: unless-stopped
    environment:
      - MBTILES_URL=${MBTILES_URL:-}
      - NODE_ENV=production
      - CACHE_SIZE=500m
    volumes:
      - mbtiles:/data/mbtiles
    ports:
      - "8090:8080"

volumes:
  mbtiles:
